<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quote</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .card {
      background: #fff;
      padding: 2rem;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 550px;
      text-align: center;
    }
    h1 { margin-bottom: 0.5rem; font-size: 1.25rem; color: #666; text-transform: uppercase; letter-spacing: 1px; }
    .quote {
      font-size: 1.5rem;
      font-style: italic;
      margin: 1.5rem 0;
      line-height: 1.6;
      min-height: 4rem;
    }
    .author {
      font-size: 1rem;
      color: #888;
      margin-bottom: 1.5rem;
    }
    button {
      padding: 0.6rem 1.5rem;
      background: #333;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 1rem;
      cursor: pointer;
    }
    button:hover { background: #555; }
    .loading { color: #999; }
    .link { margin-top: 1.5rem; font-size: 0.85rem; }
    .link a { color: #333; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Random Quote</h1>
    <div class="quote" id="quote">—</div>
    <div class="author" id="author"></div>
    <button onclick="fetchQuote()">New Quote</button>
    <div class="link"><a href="/">Back to Home</a></div>
  </div>

  <script>
    async function fetchQuote() {
      const quoteEl = document.getElementById('quote');
      const authorEl = document.getElementById('author');

      quoteEl.textContent = 'Loading...';
      quoteEl.className = 'quote loading';
      authorEl.textContent = '';

      const res = await fetch('/quote', {
        method: 'POST'
      });

      const data = await res.json();

      quoteEl.textContent = `"${data.Quote}"`;
      quoteEl.className = 'quote';
      authorEl.textContent = `— ${data.Author}`;
    }

    fetchQuote();
  </script>
</body>
</html>
